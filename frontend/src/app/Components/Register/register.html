<div class="register-container">
  <div class="register-card">

    <h2>Create Account</h2>
    <p>Register to raise complaints</p>

    <form>

      <div class="form-group">
        <label>Full Name</label>
        <input
          type="text"
          name="fullName"
          [(ngModel)]="fullName"
          placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input
          type="text"
          name="phone"
          [(ngModel)]="phone"
          placeholder="Enter your phone number">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name = 'password'
          [(ngModel)]="password"
          placeholder="Enter your password">
      </div>

      <button [disabled] ="isloading() || !fullName || !email || !phone || !password " (click)="Register()" type="submit">
        @if(isloading()){
          <span>Registering in</span>
        }
        @else{
          <span>Register</span>
        }
      </button>

    </form>

    <div class="footer">
      Already have an account?
      <a routerLink="/login">Login</a>
    </div>

  </div>
</div>

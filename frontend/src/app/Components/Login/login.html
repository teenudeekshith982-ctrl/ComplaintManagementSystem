<div class="login-container">
  <div class="login-card card">
    <h2>Complaint Management System</h2>
    <p class="subtitle">Sign in to manage and track complaints</p>

    <form #loginForm="ngForm" (submit)="loginForm.valid && Login(); $event.preventDefault()" novalidate>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input
          type="email"
          name="email"
          class="form-control"
          [(ngModel)]="email"
          #emailField="ngModel"
          [ngClass]="{ 'is-invalid': emailField.invalid && (emailField.touched || loginForm.submitted) }"
          placeholder="e.g. user@example.com"
          required
          email>
        <div class="invalid-feedback" *ngIf="emailField.invalid && (emailField.touched || loginForm.submitted)">
          <span *ngIf="emailField.errors?.['required']">Email address is required.</span>
          <span *ngIf="emailField.errors?.['email']">Please enter a valid email address.</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          name="password"
          class="form-control"
          [(ngModel)]="password"
          #passwordField="ngModel"
          [ngClass]="{ 'is-invalid': passwordField.invalid && (passwordField.touched || loginForm.submitted) }"
          placeholder="Enter your password"
          required>
        <div class="invalid-feedback" *ngIf="passwordField.invalid && (passwordField.touched || loginForm.submitted)">
          <span>Password is required.</span>
        </div>
      </div>

      <button [disabled]="loading()" type="submit" class="btn btn-primary w-full">
        <span *ngIf="loading()">Signing in...</span>
        <span *ngIf="!loading()">Sign In</span>
      </button>
    </form>

    <div class="footer">
      <span>Don't have an account? </span>
      <a routerLink="/register" class="link">Register here</a>
    </div>
  </div>
</div>

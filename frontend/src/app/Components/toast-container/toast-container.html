<div class="toast-container">
  <div *ngFor="let toast of toasts()" 
       class="toast-item animate-slide-in" 
       [ngClass]="{
         'toast-success': toast.type === 'success',
         'toast-error': toast.type === 'error',
         'toast-info': toast.type === 'info',
         'toast-warning': toast.type === 'warning'
       }">
    <div class="toast-icon">
      <span *ngIf="toast.type === 'success'" class="material-symbols-outlined">check_circle</span>
      <span *ngIf="toast.type === 'error'" class="material-symbols-outlined">error</span>
      <span *ngIf="toast.type === 'info'" class="material-symbols-outlined">info</span>
      <span *ngIf="toast.type === 'warning'" class="material-symbols-outlined">warning</span>
    </div>
    <div class="toast-message">
      {{ toast.message }}
    </div>
    <button class="toast-close-btn" (click)="remove(toast.id)">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
</div>
